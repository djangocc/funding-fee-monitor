version: "3"

services:
  influxdb:
    image: influxdb:2
    container_name: funding-influxdb
    ports:
      - "8101:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=funding123
      - DOCKER_INFLUXDB_INIT_ORG=funding
      - DOCKER_INFLUXDB_INIT_BUCKET=prices
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=funding-fee-monitor-token
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
