<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funding Fee Charts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Menlo', monospace; }

    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: #16213e; border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    .toolbar select, .toolbar button {
      background: #0f3460; color: #e0e0e0; border: 1px solid #444;
      padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
      cursor: pointer;
    }
    .toolbar select:hover, .toolbar button:hover { border-color: #4ec9b0; }
    .toolbar button.active { background: #4ec9b0; color: #1a1a2e; }
    .toolbar .period-group { display: flex; gap: 2px; }
    .toolbar .period-group button { min-width: 32px; }
    .toolbar label { font-size: 12px; color: #888; }

    .charts-container {
      display: flex; flex-direction: column; height: calc(100vh - 44px);
    }
    .chart-section { display: flex; flex-direction: column; border-bottom: 1px solid #333; }
    .chart-section.main { flex: 3; }
    .chart-section.spread { flex: 1; }
    .chart-title { font-size: 11px; padding: 4px 12px; background: #16213e; color: #888; }
    .chart-wrapper { flex: 1; position: relative; }
    canvas.overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Exchange:</label>
    <select id="exchange">
      <option value="aster">Aster</option>
      <option value="binance">Binance</option>
      <option value="okx">OKX</option>
    </select>

    <label>Spread:</label>
    <select id="spread-target">
      <option value="binance">BN - Aster</option>
      <option value="okx">OKX - Aster</option>
    </select>

    <label>Period:</label>
    <div class="period-group" id="period-group">
      <button data-period="1s">1s</button>
      <button data-period="5s">5s</button>
      <button data-period="15s">15s</button>
      <button data-period="1m" class="active">1m</button>
      <button data-period="5m">5m</button>
      <button data-period="15m">15m</button>
      <button data-period="1h">1h</button>
    </div>
  </div>

  <div class="charts-container">
    <div class="chart-section main">
      <div class="chart-title" id="price-title">Price: RAVEUSDT @ aster [1m]</div>
      <div class="chart-wrapper" id="price-chart"></div>
    </div>
    <div class="chart-section spread">
      <div class="chart-title" id="spread-title">Spread: binance - aster [1m]</div>
      <div class="chart-wrapper" id="spread-chart"></div>
    </div>
  </div>

  <script src="https://unpkg.com/klinecharts@9.8.12/dist/umd/klinecharts.min.js"></script>
  <script>
    let currentExchange = 'aster';
    let currentSpreadTarget = 'binance';
    let currentPeriod = '1m';
    let priceChart = null;
    let spreadChart = null;
    let priceData = [];  // cached for overlay drawing

    function registerIndicators() {
      klinecharts.registerIndicator({
        name: 'PREMIUM',
        shortName: 'Premium%',
        figures: [
          { key: 'premium', title: 'Premium: ', type: 'line',
            styles: () => ({ color: '#ff6b6b' }) },
        ],
        calc: (dataList) => dataList.map(d => ({ premium: d.premium ?? null })),
      });

      klinecharts.registerIndicator({
        name: 'FUNDING',
        shortName: 'FundingRate%',
        figures: [
          { key: 'funding_rate', title: 'Rate: ', type: 'line',
            styles: () => ({ color: '#cc66ff' }) },
        ],
        calc: (dataList) => dataList.map(d => ({ funding_rate: d.funding_rate ?? null })),
      });
    }

    const darkStyles = {
      grid: { show: true, horizontal: { color: '#222' }, vertical: { color: '#222' } },
      indicator: { ohlc: { show: false } },
      xAxis: { tickText: { color: '#666' } },
      yAxis: { tickText: { color: '#666' } },
    };

    function initCharts() {
      priceChart = klinecharts.init('price-chart', {
        styles: {
          ...darkStyles,
          candle: {
            type: 'area',
            area: {
              lineSize: 2,
              lineColor: '#4ec9b0',
              value: 'close',
              smooth: false,
              backgroundColor: ['rgba(78,201,176,0.1)', 'transparent'],
              point: { show: false },
            },
            priceMark: { last: { show: true } },
            tooltip: {
              custom: [
                { title: 'Contract ', value: '{close}' },
                { title: 'Mark ', value: '{mark_price}' },
                { title: 'Index ', value: '{index_price}' },
                { title: 'Premium ', value: '{premium}%' },
                { title: 'Rate ', value: '{funding_rate}%' },
              ],
            },
          },
        },
      });

      priceChart.createIndicator('PREMIUM', false, { id: 'premium_pane', height: 80 });
      priceChart.createIndicator('FUNDING', false, { id: 'funding_pane', height: 60 });

      // Subscribe to chart viewport changes to redraw overlay
      priceChart.subscribeAction('onVisibleRangeChange', drawIndexOverlay);
      priceChart.subscribeAction('onCrosshairChange', drawIndexOverlay);

      spreadChart = klinecharts.init('spread-chart', {
        styles: {
          ...darkStyles,
          candle: {
            priceMark: { last: { show: true } },
            bar: { upColor: '#4ec9b0', downColor: '#f44747', upBorderColor: '#4ec9b0', downBorderColor: '#f44747' },
            tooltip: {
              custom: [
                { title: 'open', value: '{open}%' },
                { title: 'high', value: '{high}%' },
                { title: 'low', value: '{low}%' },
                { title: 'close', value: '{close}%' },
              ],
            },
          },
        },
        customApi: {
          formatPrice: (price) => price.toFixed(2) + '%',
        },
      });

      spreadChart.createIndicator('MA', false, { id: 'candle_pane' });
    }

    // --- Canvas overlay for Index Price line ---
    function drawIndexOverlay() {
      if (!priceData.length) return;

      var chartEl = document.getElementById('price-chart');
      var canvases = chartEl.querySelectorAll('canvas');
      if (!canvases.length) return;

      // Find or create overlay canvas
      var overlayId = 'index-overlay';
      var overlay = document.getElementById(overlayId);
      // Get the main canvas (first one is usually the candle pane)
      var mainCanvas = canvases[0];

      if (!overlay) {
        overlay = document.createElement('canvas');
        overlay.id = overlayId;
        overlay.className = 'overlay';
        mainCanvas.parentElement.appendChild(overlay);
      }

      overlay.width = mainCanvas.width;
      overlay.height = mainCanvas.height;
      overlay.style.width = mainCanvas.style.width;
      overlay.style.height = mainCanvas.style.height;

      var ctx = overlay.getContext('2d');
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      // Get chart conversion functions
      var dataList = priceChart.getDataList();
      if (!dataList.length) return;

      var visibleRange = priceChart.getVisibleRange();
      var from = visibleRange.from;
      var to = Math.min(visibleRange.to, dataList.length);

      // Find Y axis range from visible data
      var minY = Infinity, maxY = -Infinity;
      for (var i = from; i < to; i++) {
        var d = dataList[i];
        if (d.high > maxY) maxY = d.high;
        if (d.low < minY) minY = d.low;
        if (d.index_price != null) {
          if (d.index_price > maxY) maxY = d.index_price;
          if (d.index_price < minY) minY = d.index_price;
        }
      }

      // Get pixel bounds of candle pane (approximate)
      var dpr = window.devicePixelRatio || 1;
      var paneHeight = overlay.height * 0.65;  // candle pane is roughly top 65%
      var leftPad = 0;
      var rightPad = 80 * dpr;  // Y axis label width
      var topPad = 30 * dpr;
      var chartWidth = overlay.width - leftPad - rightPad;

      var yRange = maxY - minY;
      if (yRange === 0) return;

      function toX(idx) {
        var barWidth = chartWidth / (to - from);
        return leftPad + (idx - from) * barWidth + barWidth / 2;
      }
      function toY(val) {
        return topPad + (1 - (val - minY) / yRange) * (paneHeight - topPad * 2);
      }

      // Draw Index Price line (yellow)
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 2 * dpr;
      ctx.setLineDash([]);
      ctx.beginPath();
      var started = false;
      for (var i = from; i < to; i++) {
        var d = dataList[i];
        if (d.index_price == null) continue;
        var x = toX(i);
        var y = toY(d.index_price);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Draw Mark Price line (pink dashed)
      ctx.strokeStyle = '#ff66b2';
      ctx.lineWidth = 1.5 * dpr;
      ctx.setLineDash([4 * dpr, 4 * dpr]);
      ctx.beginPath();
      started = false;
      for (var i = from; i < to; i++) {
        var d = dataList[i];
        if (d.mark_price == null) continue;
        var x = toX(i);
        var y = toY(d.mark_price);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Legend
      ctx.setLineDash([]);
      ctx.font = (10 * dpr) + 'px Menlo';
      var legendY = 14 * dpr;
      ctx.fillStyle = '#4ec9b0';
      ctx.fillText('— Contract', 10 * dpr, legendY);
      ctx.fillStyle = '#ffff00';
      ctx.fillText('— Index', 120 * dpr, legendY);
      ctx.fillStyle = '#ff66b2';
      ctx.fillText('-- Mark', 210 * dpr, legendY);
    }

    // --- Data loading ---
    async function loadPriceData() {
      document.getElementById('price-title').textContent =
        `Price: RAVEUSDT @ ${currentExchange} [${currentPeriod}]`;
      try {
        const resp = await fetch(`/api/kline?exchange=${currentExchange}&symbol=RAVEUSDT&period=${currentPeriod}`);
        const json = await resp.json();
        priceData = json.data;
        priceChart.applyNewData(json.data);
        setTimeout(drawIndexOverlay, 100);
      } catch (e) {
        console.error('Failed to load price data:', e);
      }
    }

    async function loadSpreadData() {
      document.getElementById('spread-title').textContent =
        `Spread: ${currentSpreadTarget} - aster [${currentPeriod}]`;
      try {
        const resp = await fetch(`/api/spread?base=aster&target=${currentSpreadTarget}&symbol=RAVEUSDT&period=${currentPeriod}`);
        const json = await resp.json();
        spreadChart.applyNewData(json.data);
      } catch (e) {
        console.error('Failed to load spread data:', e);
      }
    }

    function loadAllData() {
      loadPriceData();
      loadSpreadData();
    }

    // Auto-refresh every 5s
    setInterval(loadAllData, 5000);

    // Redraw overlay on resize
    window.addEventListener('resize', () => setTimeout(drawIndexOverlay, 200));

    // Event handlers
    document.getElementById('exchange').addEventListener('change', (e) => {
      currentExchange = e.target.value;
      loadAllData();
    });

    document.getElementById('spread-target').addEventListener('change', (e) => {
      currentSpreadTarget = e.target.value;
      loadSpreadData();
    });

    document.getElementById('period-group').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('#period-group button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentPeriod = e.target.dataset.period;
      loadAllData();
    });

    // Init
    registerIndicators();
    initCharts();
    loadAllData();
  </script>
</body>
</html>
