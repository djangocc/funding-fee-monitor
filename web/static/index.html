<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funding Fee Charts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Menlo', monospace; }

    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: #16213e; border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    .toolbar select, .toolbar button {
      background: #0f3460; color: #e0e0e0; border: 1px solid #444;
      padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
      cursor: pointer;
    }
    .toolbar select:hover, .toolbar button:hover { border-color: #4ec9b0; }
    .toolbar button.active { background: #4ec9b0; color: #1a1a2e; }
    .toolbar .period-group { display: flex; gap: 2px; }
    .toolbar .period-group button { min-width: 32px; }
    .toolbar label { font-size: 12px; color: #888; }

    #chart { width: 100%; height: calc(100vh - 44px); }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Exchange:</label>
    <select id="exchange">
      <option value="aster">Aster</option>
      <option value="binance">Binance</option>
      <option value="okx">OKX</option>
    </select>

    <label>Period:</label>
    <div class="period-group" id="period-group">
      <button data-period="1s">1s</button>
      <button data-period="5s">5s</button>
      <button data-period="15s">15s</button>
      <button data-period="1m" class="active">1m</button>
      <button data-period="5m">5m</button>
      <button data-period="15m">15m</button>
      <button data-period="1h">1h</button>
    </div>
  </div>

  <div id="chart"></div>

  <script src="https://unpkg.com/klinecharts@9.8.12/dist/umd/klinecharts.min.js"></script>
  <script>
    let currentExchange = 'aster';
    let currentPeriod = '1m';
    let chart = null;

    // --- Register custom indicators ---
    function registerIndicators() {
      // Contract mid price line (main pane, replaces candle)
      klinecharts.registerIndicator({
        name: 'CONTRACT_PRICE',
        shortName: 'Contract',
        figures: [
          { key: 'contract', title: 'Contract: ', type: 'line', styles: { color: '#4ec9b0' } },
        ],
        calc: (dataList) => dataList.map(d => ({ contract: d.close || null })),
      });

      // Index price line (main pane overlay)
      klinecharts.registerIndicator({
        name: 'IDX_PRICE',
        shortName: 'Index',
        figures: [
          { key: 'index_price', title: 'Index: ', type: 'line', styles: { color: '#e6b422' } },
        ],
        calc: (dataList) => dataList.map(d => ({ index_price: d.index_price || null })),
      });

      // Premium % (contract vs index) sub-pane
      klinecharts.registerIndicator({
        name: 'PREMIUM',
        shortName: 'Premium%',
        figures: [
          { key: 'premium', title: 'Premium: ', type: 'line', styles: { color: '#ff6b6b' } },
        ],
        calc: (dataList) => dataList.map(d => ({ premium: d.premium ?? null })),
      });

      // Funding Rate % sub-pane
      klinecharts.registerIndicator({
        name: 'FUNDING',
        shortName: 'FundingRate%',
        figures: [
          { key: 'funding_rate', title: 'Rate: ', type: 'line', styles: { color: '#cc66ff' } },
        ],
        calc: (dataList) => dataList.map(d => ({ funding_rate: d.funding_rate ?? null })),
      });
    }

    function initChart() {
      chart = klinecharts.init('chart', {
        styles: {
          grid: { show: true, horizontal: { color: '#222' }, vertical: { color: '#222' } },
          candle: {
            type: 'area',
            area: {
              lineSize: 0,
              lineColor: 'transparent',
              value: 'close',
              smooth: false,
              backgroundColor: ['transparent', 'transparent'],
              point: { show: false },
            },
            priceMark: { last: { show: true } },
            tooltip: { showRule: 'none' },
          },
          indicator: { ohlc: { show: false } },
          xAxis: { tickText: { color: '#666' } },
          yAxis: { tickText: { color: '#666' } },
        },
      });

      // Main pane: contract price line + index price line
      chart.createIndicator('CONTRACT_PRICE', false, { id: 'candle_pane' });
      chart.createIndicator('IDX_PRICE', false, { id: 'candle_pane' });

      // Sub-pane: premium %
      chart.createIndicator('PREMIUM', false, { id: 'premium_pane', height: 120 });

      // Sub-pane: funding rate %
      chart.createIndicator('FUNDING', false, { id: 'funding_pane', height: 100 });
    }

    async function loadData() {
      try {
        const resp = await fetch(`/api/kline?exchange=${currentExchange}&symbol=RAVEUSDT&period=${currentPeriod}`);
        const json = await resp.json();
        chart.applyNewData(json.data);
      } catch (e) {
        console.error('Failed to load data:', e);
      }
    }

    // Auto-refresh every 5s
    setInterval(loadData, 5000);

    // Event handlers
    document.getElementById('exchange').addEventListener('change', (e) => {
      currentExchange = e.target.value;
      loadData();
    });

    document.getElementById('period-group').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('#period-group button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentPeriod = e.target.dataset.period;
      loadData();
    });

    // Init
    registerIndicators();
    initChart();
    loadData();
  </script>
</body>
</html>
